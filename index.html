<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог предприятий с генератором обращений</title>
    <style>
        :root {
            --primary-color: #8b5cf6;
            --dark-color: #222;
            --light-color: #f4f4f9;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: var(--light-color); color: var(--dark-color); }
        header { background-color: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h1 { margin-top: 0; text-align: center; }
        .form-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 15px; align-items: center; }
        input, textarea, button { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        
        .file-upload-btn {
            display: inline-block;
            padding: 10px;
            background: #e2e8f0;
            border: 1px dashed #a0aec0;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-upload-btn:hover { background: #cbd5e0; }
        #imgInp { display: none; }

        button.save-btn { background-color: #ffcc00; border: none; font-weight: bold; cursor: pointer; transition: background 0.2s; height: 100%; }
        button.save-btn:hover { background-color: #e6b800; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .grid:empty::after {
            content: "У вас пока нет добавленных предприятий. Используйте форму выше, чтобы добавить первую карточку! 🏢";
            grid-column: 1 / -1;
            text-align: center;
            color: #777;
            font-size: 16px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            border: 2px dashed #ccc;
        }

        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,0,0,0.8); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold; z-index: 10; }
        .card-img { width: 100%; height: 180px; object-fit: cover; background-color: #ddd; }
        .card-body { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { margin: 0 0 10px 0; font-size: 20px; }
        .card-info { font-size: 14px; color: #555; margin-bottom: 15px; flex-grow: 1; }
        .card-contacts { font-size: 13px; font-style: italic; color: #777; border-top: 1px solid #eee; padding-top: 10px; padding-bottom: 10px;}
        .ai-block { margin-top: 15px; background: #f9f6ff; border: 1px dashed var(--primary-color); padding: 10px; border-radius: 8px; }
        .ai-block h4 { margin: 0 0 5px 0; color: var(--primary-color); font-size: 14px;}
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; max-width: 500px; width: 90%; }
    </style>
</head>
<body>

    <header>
        <h1>🏢 Интеллектуальный каталог предприятий</h1>
        <h3>Добавить новое предприятие:</h3>
        <div class="form-container">
            <input type="text" id="nameInp" placeholder="Название фирмы" required>
            
            <label class="file-upload-btn" id="fileLabel">
                📁 Выбрать фото с ПК
                <input type="file" id="imgInp" accept="image/*" onchange="updateFileName()">
            </label>

            <input type="text" id="contactInp" placeholder="Контакты (Телефон / Email)" required>
            <textarea id="infoInp" placeholder="Описание деятельности" rows="1" required></textarea>
            <button class="save-btn" onclick="addCard()">Сохранить карточку</button>
        </div>
    </header>

    <main class="grid" id="cardsGrid"></main>

    <div class="modal" id="aiModal">
        <div class="modal-content">
            <h3>🤖 Сгенерированное обращение:</h3>
            <p id="aiResultText" style="white-space: pre-wrap; line-height: 1.5; background: #f5f5f5; padding: 10px; border-radius: 6px; max-height: 300px; overflow-y: auto;"></p>
            <button onclick="closeModal()" style="width: 100%; background-color: var(--primary-color); color: white;">Закрыть</button>
        </div>
    </div>

    <script>
        // Рабочие ключи авторизации Яндекс Облака
        const YANDEX_FOLDER_ID = 'b1gkmc544ntlq16dptm0'; 
        const YANDEX_API_KEY = 'aje2e358osc1eusvol81';

        const STORAGE_KEY = 'my_saved_enterprises';
        
        let enterprises = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        // Функция для отслеживания выбора файла (ИСПРАВЛЕНО)
        function updateFileName() {
            const fileInput = document.getElementById('imgInp');
            const label = document.getElementById('fileLabel');
            if (fileInput && fileInput.files && fileInput.files.length > 0) {
                label.innerText = "✔️ Фото выбрано";
            } else {
                label.innerText = "📁 Выбрать фото с ПК";
            }
        }

        function saveToStorage() { 
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(enterprises)); 
            } catch(e) {
                alert("Ошибка! Хранилище браузера переполнено.");
            }
        }

        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            
            if (!enterprises || enterprises.length === 0) return;

            enterprises.forEach(company => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteCard(${company.id})">×</button>
                    <img class="card-img" src="${company.img || 'https://placeholder.com'}" alt="${company.name}">
                    <div class="card-body">
                        <h2 class="card-title">${company.name}</h2>
                        <p class="card-info">${company.info}</p>
                        <div class="card-contacts"><strong>Контакты:</strong> ${company.contacts}</div>
                        <div class="ai-block">
                            <h4>✨ Составить обращение через YandexGPT</h4>
                            <input type="text" id="prompt-${company.id}" placeholder="Суть (например: хочу заказать банкет на 20 человек)" style="width: calc(100% - 22px); margin-bottom: 8px;">
                            <button onclick="generateAIRequest(${company.id})" style="width: 100%; font-size: 13px; background: #8b5cf6; color: white;">Сгенерировать текст</button>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function (event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    callback(compressedBase64);
                };
            };
        }

        function addCard() {
            const name = document.getElementById('nameInp').value;
            const fileInput = document.getElementById('imgInp');
            const contacts = document.getElementById('contactInp').value;
            const info = document.getElementById('infoInp').value;

            if (!name || !contacts || !info) { 
                alert("Заполните все обязательные текстовые поля (Название, Контакты, Описание)!"); 
                return; 
            }

            if (fileInput && fileInput.files && fileInput.files.length > 0) {
                compressImage(fileInput.files[0], function(compressedImgData) {
                    executeAdd(name, compressedImgData, contacts, info);
                });
            } else {
                executeAdd(name, '', contacts, info);
            }
        }

        function executeAdd(name, imgData, contacts, info) {
            enterprises.push({ 
                id: Date.now(), 
                name: name, 
                img: imgData, 
                info: info, 
                contacts: contacts 
            });
            
            saveToStorage();
            renderCards();

            // Исправленная очистка полей формы (убрана ошибка 'value' of null)
            document.getElementById('nameInp').value = '';
            document.getElementById('contactInp').value = '';
            document.getElementById('infoInp').value = '';
            
            const fileInput = document.getElementById('imgInp');
            if (fileInput) fileInput.value = ''; // Безопасный сброс файла
            
            document.getElementById('fileLabel').innerText = '📁 Выбрать фото с ПК';
        }

        function deleteCard(id) { 
            enterprises = enterprises.filter(company => company.id !== id); 
            saveToStorage(); 
            renderCards(); 
        }

        async function generateAIRequest(id) {
            const company = enterprises.find(c => c.id === id);
            if (!company) return;
            
            const userPrompt = document.getElementById(`prompt-${id}`).value;

            if (!userPrompt) {
                alert("Пожалуйста, напишите кратко суть обращения.");
                return;
            }

            const resultTextElement = document.getElementById('aiResultText');
            document.getElementById('aiModal').style.display = 'flex';
            resultTextElement.innerText = "YandexGPT составляет текст обращения... ⏳";

            try {
            // ИСПОЛЬЗУЕМ СТАБИЛЬНЫЙ CORS-ОБХОД БЕЗ БЛОКИРОВОК (Исправлены полные ссылки)
            const response = await fetch("https://cors-anywhere.herokuapp.com/https://llm.api.cloud.yandex.net/foundationModels/v1/completion"),
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    method: "POST",
                    headers: {
                        "Authorization": `Api-Key ${YANDEX_API_KEY}`,
                        "x-folder-id": YANDEX_FOLDER_ID,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        modelUri: `gpt://${YANDEX_FOLDER_ID}/yandexgpt-lite`,
                        completionOptions: { 
                            stream: false, 
                            temperature: 0.6, 
                            maxTokens: 1000 
                        },
                        messages: [
                            { 
                                role: "system", 
                                text: "Ты — профессиональный ИИ-ассистент. Напиши грамотное, вежливое обращение к предприятию." 
                            },
                            { 
                                role: "user", 
                                text: `Напиши обращение к "${company.name}" (${company.info}). Суть: ${userPrompt}.` 
                            }
                        ]
                    })
                })
            });

            const outerData = await response.json();
            const data = JSON.parse(outerData.contents);

            if (data.result && data.result.alternatives && data.result.alternatives[0]) {
                resultTextElement.innerText = data.result.alternatives[0].message.text;
            } else if (data.message) {
                resultTextElement.innerText = `Ошибка от Яндекса: ${data.message}`;
            } else {
                resultTextElement.innerText = "Не удалось расшифровать ответ ИИ.";
            }
        } 
        catch (error) {
            resultTextElement.innerText = "Ошибка сети при генерации обращения.";
        }

        }

        function closeModal() { 
            document.getElementById('aiModal').style.display = 'none'; 
        }

        // Запуск отображения сохраненных данных
        renderCards();
</script>
</body>
</html>
